aid: authologic
name: Authologic
description: >-
  Authologic provides identity verification solutions that allow businesses to
  add government-issued digital IDs, identity wallets, and Bank IDs to their
  existing KYC/AML workflows. It supports seamless integration of electronic
  identity verification across multiple countries and identity providers.
